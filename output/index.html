<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTRUST - 日本のキャリアSNS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <img src="https://youtrust.jp/assets/logo-f6e0b7b1.svg" alt="YOUTRUST">
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="#">できること</a></li>
                    <li><a href="#">おすすめコンテンツ</a></li>
                    <li><a href="#">利用者の声</a></li>
                    <li><a href="#">募集はこちら</a></li>
                    <li><a href="#">よくある質問</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="#" class="link-recruit">採用したい企業様はこちら ↗</a>
                <a href="#" class="btn-login">ログイン</a>
                <a href="#" class="btn-register">新規登録</a>
            </div>
        </div>
    </header>

    <main class="hero">
        <div class="hero-content">
            <div class="hero-text-area">
                <p class="hero-catchphrase">"つながり"がキャリアの可能性を広げる</p>
                <h1 class="hero-title">日本のキャリアSNS</h1>
                <div class="hero-logo-large">
                    <img src="https://youtrust.jp/assets/logo-f6e0b7b1.svg" alt="YOUTRUST">
                </div>
                <div class="hero-stats">
                    <div class="stat-item laurel-container">
                        <div class="laurel laurel-left"></div>
                        <p>登録ユーザー<br><span class="highlight">約40万人</span></p>
                        <div class="laurel laurel-right"></div>
                    </div>
                    <div class="stat-item laurel-container">
                        <div class="laurel laurel-left"></div>
                        <p>経済産業省主催<br>日本スタートアップ大賞2024<br><span class="award-text">審査委員会特別賞</span></p>
                        <div class="laurel laurel-right"></div>
                    </div>
                </div>
                <div class="hero-cta">
                    <a href="#" class="btn-cta-main">今すぐ会員登録 (無料)</a>
                    <div class="cta-badge">30秒</div>
                </div>
            </div>

            <div class="hero-visual">
                <div class="circle-bg-large"></div>
                <div class="circle-bg-medium"></div>
                <div class="visual-smartphone">
                    <div class="mock-screen">
                        <div class="mock-header">
                            <img src="https://youtrust.jp/assets/logo-f6e0b7b1.svg" alt="">
                        </div>
                        <div class="mock-profile">
                            <div class="profile-img-wrap">
                                <img src="https://placehold.jp/80x80.png" alt="profile" class="profile-img">
                            </div>
                            <p class="profile-name">伊藤 みく</p>
                        </div>
                        <div class="mock-stats">
                            <div class="mock-stat"><span>注目</span>6人</div>
                            <div class="mock-stat"><span>気になる</span>38社</div>
                        </div>
                    </div>
                </div>
                
                <div class="visual-item item-top">
                    <div class="item-label">副業・転職</div>
                    <div class="character-icon char-1">
                        <svg viewBox="0 0 100 100" class="char-svg"><circle cx="50" cy="40" r="25" fill="#33b1b1"/><path d="M20 90 Q50 60 80 90" fill="none" stroke="#33b1b1" stroke-width="5"/></svg>
                    </div>
                </div>
                <div class="visual-item item-right">
                    <div class="item-label">情報収集</div>
                    <div class="character-icon char-2">
                        <svg viewBox="0 0 100 100" class="char-svg"><circle cx="50" cy="40" r="25" fill="#ff6b6b"/><path d="M20 90 Q50 60 80 90" fill="none" stroke="#ff6b6b" stroke-width="5"/></svg>
                    </div>
                </div>
                <div class="visual-item item-bottom">
                    <div class="item-label">交流</div>
                    <div class="character-icon char-3">
                        <svg viewBox="0 0 100 100" class="char-svg"><circle cx="50" cy="40" r="25" fill="#ffd93d"/><path d="M20 90 Q50 60 80 90" fill="none" stroke="#ffd93d" stroke-width="5"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
